name: Keep alive (Render)

# Mantiene despierto el servicio gratuito de Render haciendo ping cada ~10 min.
# Evita el "arranque en frío" para los visitantes.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://gest26.onrender.com/api/health || echo 000)
            echo "intento $i -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "El servicio no respondió 200 (puede estar despertando)."
